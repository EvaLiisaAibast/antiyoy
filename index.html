<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Antiyoy Multiplayer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;700&family=IM+Fell+English&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- MAIN UI -->
  <div id="ui">
    <div id="uiLeft">
      <input id="username" placeholder="Enter username" autocomplete="off" />
      <button id="joinBtn" class="btn-primary">Join Game</button>
      <button id="startBtn" class="btn-secondary">Start Game</button>
    </div>
    <div id="uiCenter">
      <div id="info">Phase: lobby | Turn: -</div>
    </div>
    <div id="uiRight">
      <select id="buyType">
        <option value="">⚔ Buy Unit/Building...</option>
        <optgroup label="Units">
          <option value="peasant">🧑 Peasant (10g)</option>
          <option value="spearman">⚔ Spearman (20g)</option>
          <option value="knight">🛡 Knight (30g)</option>
          <option value="baron">👑 Baron (40g)</option>
        </optgroup>
        <optgroup label="Buildings">
          <option value="farm">🌾 Farm (+2 income, 15g)</option>
          <option value="tower">🗼 Tower (defense, 25g)</option>
          <option value="fortress">🏰 Fortress (strong defense, 40g)</option>
        </optgroup>
      </select>
      <button id="endBtn" class="btn-danger">End Turn</button>
    </div>
  </div>

  <div id="unitPanel">
    <span id="unitInfo">— No player data —</span>
  </div>

  <div id="mapWrapper">
    <div id="map"></div>
  </div>

  <div id="tooltip"></div>

  <!-- Spotify Embed Bottom Left -->
  <div id="spotifyEmbed">
    <iframe data-testid="embed-iframe" style="border-radius:12px" 
            src="https://open.spotify.com/embed/playlist/25FRBddMnZKKctxOi2ZbBs?utm_source=generator" 
            width="300" height="80" frameborder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy">
    </iframe>
    <div style="font-size:10px;color:#ccc;margin-top:2px;">Recommended background music</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
